<!-- 
4. Galeria de Imagens Simples 
Crie  uma  página  exibindo  três  imagens  de  temas  diferentes.  Para  cada 
imagem: 
• Defina uma largura (width) fixa. 
• Adicione obrigatoriamente o atributo alt com uma descrição acessível. 
• Coloque uma legenda curta abaixo de cada imagem usando um parágrafo.
-->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Galeria de Imagens Simples</title>
</head>
<body>
    <main>
        <h1>Galeria de Imagens</h1>
        <div>
            <div>
                <img src="imgs/darth-vader-.jpeg" alt="Darth Vader">
                <h2>Star Wars</h2>
                <p>Darth Vader é um personagem icônico da franquia Star Wars.</p>
            </div>

            <div>
                <img src="imgs/comida.jpeg" alt="Comida">
                <h2>Comida</h2>
                <p>Comida é uma parte importante da vida humana.</p>
            </div>

            <div>
                <img src="imgs/animais.jpg" alt="Animais">
                <h2>Fauna Animal</h2>
                <p>Fauna animal refere-se aos animais que vivem em determinados ambientes.</p>
            </div>
        </div>
    </main>
</body>
</html>
