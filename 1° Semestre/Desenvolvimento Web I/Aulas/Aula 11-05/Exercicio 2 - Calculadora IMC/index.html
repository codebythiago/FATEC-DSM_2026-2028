<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Calculadora IMC - Exercício 2</title>
  </head>
  <body>
    <h1>Calculadora IMC</h1>
    <form id="form-imc">
      <div class="form-group">
        <input type="radio" name="idade" id="adulto"/>
        <label for="adulto">Adulto</label>
        <input type="radio" name="idade" id="crianca"/>
        <label for="crianca">Criança</label>
      </div> 
      <div class="form-group-1">
        <label for="peso">Peso</label>
        <input type="number" name="peso" step="0.1" id="peso" min="1" placeholder="Ex.: 79" oninput="if(this.value < 0) this.value = 0;"/>
      </div>
      <div class="form-group-1">
        <label for="altura">Altura (m)</label>
        <input type="number" name="altura" id="altura" placeholder="Ex.: 1.68 ou 168" min="0.5" max="3" step=".01" oninput="if(this.value < 0) this.value = 0; if(this.value > 3) this.value = 3"/>
      </div>
      <button type="submit" id="submit-btn">Calcular</button>
    </form>
    <div id="resultado">
      <div id="nome-imc">Peso Normal</div>
      <div id="valor-imc">O seu IMC é: <strong>0.00</strong></div>
      <div id="texto-imc">Seu peso está normal.</div>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
