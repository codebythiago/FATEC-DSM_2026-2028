<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Tabuada Dinâmica - Exercicio 14</title>
  </head>
  <body>
    <h1>Tabuada Dinâmica</h1>
    <div class="card">
      <div class="input-group">
        <label for="numero">Número</label>
        <input type="number" name="numero" id="numero" placeholder="Ex.: 10, 9, 23.4, 3.1415"/>
      </div>
      <button type="button" id="gerar-btn">Gerar Tabuada</button>
      <ul id="tabuada">
        <span>A tabuada vai aparecer aqui:</span>
      </ul>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
