<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comparador de Números - Exercício 15</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <h1>Comparador de Números</h1>

    <div class="card">
        <div class="input-group">
          <label for="num1">Primeiro Número</label>
          <input type="number" name="num1" id="num1" placeholder="Ex.: 7, 10, 21.1, 439.89"/>
        </div>
        <div class="input-group">
          <label for="num2">Segundo Número</label>
          <input type="number" name="num2" id="num2" placeholder="Ex.: 7, 10, 21.1, 439.89"/>
        </div>
        <button type="button" id="comparar-btn">Comparar</button>
        <div id="resultado">0 é igual à 0</div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
