<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>Cálculo de Área do Triângulo - Exercício 4</title>
</head>
<body>
  <h1>Cálculo de Área de Triângulo</h1>

  <div class="card">
    <div class="input-group">
      <label for="base">Base do Triângulo</label>
      <input type="number" name="base" id="base" oninput="if (this.value < 0) this.value = 0">
      <label for="unidade-base" class="sr-only">Unidade da Base do Triângulo</label>
      <select name="unidade-base" id="unidade-base">
        <option value="mm">Milímetro(s) (mm)</option>
        <option value="cm">Centímetro(s) (cm)</option>
        <option value="dm">Decímetro(s) (dm)</option>
        <option value="m" selected>Metro(s) (m)</option>
        <option value="dam">Decâmetro(s) (dam)</option>
        <option value="hm">Hectômetro(s) (hm)</option>
        <option value="km">Quilômetro(s) (km)</option>
      </select>
    </div>

    <div class="input-group">
      <label for="altura">Altura do Triângulo</label>
      <input type="number" name="altura" id="altura" oninput="if (this.value < 0) this.value = 0">
      <label for="unidade-altura" class="sr-only">Unidade da Altura do Triângulo</label>
      <select name="unidade-altura" id="unidade-altura">
        <option value="mm">Milímetro(s) (mm)</option>
        <option value="cm">Centímetro(s) (cm)</option>
        <option value="dm">Decímetro(s) (dm)</option>
        <option value="m" selected>Metro(s) (m)</option>
        <option value="dam">Decâmetro(s) (dam)</option>
        <option value="hm">Hectômetro(s) (hm)</option>
        <option value="km">Quilômetro(s) (km)</option>
      </select>
    </div>

    <button type="button" id="calcular-btn">Calcular Área</button>
    <div id="container-resultado">
      <label for="unidade-area" class="sr-only">Unidade da Área do Triângulo</label>
      <select name="unidade-area" id="unidade-area">
        <option value="mm">Milímetro(s) (mm)</option>
        <option value="cm">Centímetro(s) (cm)</option>
        <option value="dm">Decímetro(s) (dm)</option>
        <option value="m" selected>Metro(s) (m)</option>
        <option value="dam">Decâmetro(s) (dam)</option>
        <option value="hm">Hectômetro(s) (hm)</option>
        <option value="km">Quilômetro(s) (km)</option>
      </select>
      <p><b>Área do Triângulo:</b> <span id="res-unidade-area">0.00 m<sup>2</sup></span></p>
    </div>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
