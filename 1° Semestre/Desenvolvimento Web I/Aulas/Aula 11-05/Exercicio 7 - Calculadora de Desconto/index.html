<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Calculadora de Desconto - Exercício 7</title>
  </head>
  <body>
    <h1>Calculadora de Desconto</h1>
    <div class="card">
      <div class="input-group">
        <label for="valor-produto">Valor do Produto</label>
        <input type="number" name="valor-produto" id="valor-produto" placeholder="Ex.: 5,50, 499.97" oninput="if(this.value < 0) this.value = 0"/>
      </div>
      <div class="input-group">
        <label for="valor-desconto">Valor do Desconto (%)</label>
        <input type="number" name="valor-desconto" id="valor-desconto" placeholder="Ex.: 10, 20, 30" oninput="if(this.value < 0) this.value = 0; if (this.value > 100) this.value = 100"/>
      </div>
      <button type="button" id="calcular-btn">Calcular Valor Total</button>
      <div id="resultado">
        <div>
          <span>Valor do Produto:</span> <span id="res-valor-produto">R$ 0.00</span>
        </div>
        <div>
          <span>Valor do Desconto:</span> <span id="res-valor-desconto">R$ 0.00</span>
        </div>
        <div id="div-res-total">
          <span>Valor Total:</span> <span><b id="res-total">R$ 0.00</b></span>
        </div>
      </div>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
