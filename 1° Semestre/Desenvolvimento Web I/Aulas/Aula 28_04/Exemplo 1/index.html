<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>Exemplo de Calculadora Soma</title>
</head>
<body>
  <main class="container">
    
    <h1>Soma de Valores via formulário</h1>
    <form action="">
      <div class="input-group">
        <label for="n1">Digite o primeiro número</label>
        <input type="number" step="0.1" name="n1" id="n1" placeholder="Digite um número">
      </div>
      <div class="input-group">
        <label for="n2">Digite o segundo número</label>
        <input type="number" step="0.1" name="n2" id="n2" placeholder="Digite um número">
      </div>
      <button type="button" id="btn-soma">Somar</button>
    </form>

    <div id="resultado">Resultado:</div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
