<!--
7. Formulário de Contato Básico
Construa um formulário contendo:

1. Campo de texto para "Nome".
2. Campo de e-mail.
3. Uma área de texto (textarea) para "Mensagem".
4. Um botão de envio (submit).

Dica: Use a tag label para cada campo.
-->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Formulário de Contato Básico</title>
</head>
<body>
    <h1>Formulário de Contato Básico</h1>
    <form action="">
        <div class="form-item">
            <label for="nome">Nome Completo</label>
            <input type="text" name="nome" id="nome" autocomplete="name">
        </div>
        
        <div class="form-item">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" autocomplete="email">
        </div>

        <div class="form-item">
            <label for="mensagem">Mensagem</label>
            <textarea name="mensagem" id="mensagem"></textarea>
        </div>

        <button type="submit">Enviar</button>
    </form>
</body>
</html>
