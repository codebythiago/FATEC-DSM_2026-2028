<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Validação de Formulários - Aula 11/05</title>
</head>
<body>
    <div class="form-card">
        <h2>Cadastro</h2>
        <form id="meuFormulario">
            <div class="campo">
                <label for="nome">Nome Completo</label>
                <input type="text" name="nome" id="nome" autocomplete="name">
                <div id="erro-nome" class="erro">O nome é obrigatório.</div>
            </div>
            
            <div class="campo">
                <label for="email">Email</label>
                <input type="text" name="email" id="email" autocomplete="email">
                <div id="erro-email" class="erro">Insira um email válido.</div>
            </div>
            
            <div class="campo">
                <label for="senha">Senha (mínimo de 6 caracteres)</label>
                <input type="password" name="senha" id="senha" autocomplete="new-password">
                <div id="erro-senha" class="erro">A senha deve ter pelo menos 6 caracteres.</div>
            </div>
            
            <button type="submit">Enviar Cadastro</button>
            <div id="mensagem-sucesso" class="sucesso">Formulário enviado com sucesso.</div>
        </form>
    </div>
    
    <script src="js/script.js"></script>
</body>
</html>
