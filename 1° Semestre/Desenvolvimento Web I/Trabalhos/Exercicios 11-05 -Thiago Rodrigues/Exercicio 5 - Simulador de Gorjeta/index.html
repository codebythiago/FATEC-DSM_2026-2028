<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Simulador de Gorjeta - Exercício 5</title>
  </head>
  <body>
    <h1>Simulador de Gorjeta</h1>
    <div class="card">
      <div class="input-group">
        <label for="valor-conta">Valor da Conta (R$)</label>
        <input
          type="number"
          name="valor-conta"
          id="valor-conta"
          placeholder="Ex.: 5,50, 499.97"
          oninput="if (this.value < 0) this.value = 0;"
        />
      </div>
      <div class="input-group">
        <label for="valor-gorjeta">Valor da Gorjeta (%)</label>
        <input
          type="number"
          name="valor-gorjeta"
          id="valor-gorjeta"
          placeholder="Ex.: 10, 20, 30"
          oninput="if (this.value < 0) this.value = 0;"
        />
      </div>
      <button type="button" id="calcular-btn">Calcular Valor Total</button>
      <div id="resultado">
        <div>
          <span>Valor da Conta:</span> <span id="res-valor-conta">R$ 0.00</span>
        </div>
        <div>
          <span>Valor da Gorjeta:</span>
          <span id="res-valor-gorjeta">R$ 0.00</span>
        </div>
        <div id="div-res-total">
          <span>Valor Total:</span> <span><b id="res-total">R$ 0.00</b></span>
        </div>
      </div>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
