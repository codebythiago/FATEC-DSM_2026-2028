<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Verificador de Idade - Exercício 8</title>
  </head>
  <body>
    <h1>Verificador de Idade</h1>
    <div class="card">
      <form id="form-idade">
        <div class="input-group">
          <label for="data-nasc">Selecione a sua data de nascimento</label>
          <input type="date" name="data-nasc" id="data-nasc"/>
        </div>
        <button type="submit" id="verificar-btn">Verificar</button>
        <div id="resultado">
          <span id="exibir-idade">Você possui: 0 anos.</span>
          <span id="maior-menor-idade">Você é menor de idade</span>
        </div>
      </form>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
