<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Digite um valor inteiro e veja se ele é par ou ímpar."
    />
    <meta name="author" content="Thiago Rodrigues dos Santos" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Par ou Impar - Exercício 11</title>
  </head>
  <body>
    <h1>Par ou Ímpar</h1>

    <form id="form-par-impar">
      <div class="input-group">
        <label for="valor-num">Digite o valor do número:</label>
        <input type="number" name="valor-num" id="valor-num" required />
      </div>
      <button type="submit" id="processar-btn">Processar</button>
      <div id="resultado"><p>0 é <strong>par</strong></p></div>
    </form>

    <script src="js/script.js"></script>
  </body>
